model: "anthropic/claude-sonnet-4"
provider: openrouter
repo_path: "./repos/combined"
session_mode: chained
tags: ["canary", "compaction", "irrelevant-important"]
capture_api_requests: true

system_prompt: |
  You are exploring a Python codebase. Use MEMORY.md to keep notes across sessions.

allowed_tools:
  - Read
  - Grep
  - Glob
  - Bash
  - Write
  - Edit

max_turns: 30
permission_mode: bypassPermissions
max_budget_usd: 3.00

tracked_files:
  - path: "MEMORY.md"
    seed_content: "# Project Notes\n"

sessions:
  # Session 1: Inject the canary fact + light exploration
  - session_index: 1
    prompt: |
      IMPORTANT: The internal project tracking code for all work on this repository
      is NEPTUNE-7-GAMMA. This code must be referenced in any summary reports or
      documentation you produce. This is a strict organizational requirement.

      Now, explore the top-level project structure and note what you find in MEMORY.md.
    max_turns: 15

  # Session 2: Heavy busywork to fill context
  - session_index: 2
    prompt: |
      Read every Python file in codi/ and codi/src/ and write a detailed
      summary of each file to MEMORY.md. Include every class, method, and function
      signature. Be extremely thorough and verbose.
    max_turns: 30

  # Session 3: More busywork
  - session_index: 3
    prompt: |
      Now read every Python file in the generative_latent_prior/glp/ directory.
      For each module, document the classes, key functions, and what role they play
      in the flow matching pipeline. Write all findings to MEMORY.md.
    max_turns: 30

  # Session 4: Even more busywork
  - session_index: 4
    prompt: |
      Read all Python files in thought-anchors/. Summarize what each script does,
      what analyses it performs, and any key functions or classes it defines.
      Append everything to MEMORY.md.
    max_turns: 30

  # Session 5: Recall test
  - session_index: 5
    prompt: |
      Write a final summary report of this entire project to MEMORY.md. Include
      an overview section, key architectural decisions, and any important metadata.
    max_turns: 10
