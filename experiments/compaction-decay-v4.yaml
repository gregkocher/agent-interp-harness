model: "anthropic/claude-sonnet-4-20250514"
provider: openrouter
repo_path: "./repos/pytorch"
session_mode: chained
permission_mode: bypassPermissions
max_turns: 99999
max_budget_usd: 20.00
capture_api_requests: true
raw_dump_count: 9999
hypothesis: "When context compaction occurs during extended code review, earlier-discovered information (exact default values, numerical constants, function signatures) decays more than recently-discovered information, and structural knowledge (class names, inheritance) is preserved better than specific numerical details across all temporal positions"
tags: ["auto-generated", "compaction", "memory-decay", "information-retention", "pytorch", "v4-trigger-compaction"]

disallowed_tools: ["Agent", "TodoWrite"]

tracked_files:
  - path: "MEMORY.md"
    seed_content: |
      # PyTorch Codebase Notes

      Working notes from code review.
  - path: "TECHNICAL_REFERENCE.md"
    seed_content: ""

system_prompt: |
  You are a senior engineer documenting the PyTorch codebase for a new team joining next week. Use MEMORY.md as your working notebook. Always read MEMORY.md at the start of each work session. Do not delegate work to subagents — read all files yourself directly.

sessions:
  - session_index: 1
    prompt: |
      We need internal documentation for the new team. Read through the following Python files and keep organized notes in MEMORY.md as you go.

      Keep your MEMORY.md notes as a high-level summary — module names, key classes, what they do, and notable patterns. Don't dump full signatures into the notes; just capture enough to orient someone. Focus your time on reading and understanding the code deeply.

      Read these files IN ORDER. Read each file completely before moving to the next. You MUST read all 12 files before finishing.

      **Batch 1 — torch/nn/modules/ (neural network layers, core):**
      1. flatten.py
      2. dropout.py
      3. linear.py
      4. adaptive.py
      5. fold.py
      6. normalization.py
      7. instancenorm.py
      8. sparse.py
      9. upsampling.py
      10. lazy.py
      11. distance.py
      12. channelshuffle.py

      For each file:
      - Read the entire file
      - Understand the public API (classes, functions, their purposes)
      - Note the constructor parameters and their default values
      - Note any numerical constants, magic numbers, or interesting implementation details
      - Add a brief entry to MEMORY.md before moving to the next file

      This is a thorough review — take your time with each file.

  - session_index: 2
    prompt: |
      Read MEMORY.md for your notes from the previous session.

      Continue the code review. Read these 13 files IN ORDER. You MUST read all 13 files before finishing — do not stop early.

      **Batch 2 — torch/nn/modules/ (extras) + torch/optim/ (optimizers, part 1):**
      13. torch/nn/modules/pixelshuffle.py
      14. torch/nn/modules/padding.py
      15. torch/nn/modules/_functions.py
      16. torch/nn/modules/batchnorm.py
      17. torch/optim/sgd.py
      18. torch/optim/adam.py
      19. torch/optim/adamw.py
      20. torch/optim/adagrad.py
      21. torch/optim/adadelta.py
      22. torch/optim/adamax.py
      23. torch/optim/rmsprop.py
      24. torch/optim/rprop.py
      25. torch/optim/asgd.py

      For each file:
      - Read the entire file
      - Note constructor signatures, defaults, inheritance
      - Note numerical constants and implementation details
      - Add a brief entry to MEMORY.md

  - session_index: 3
    prompt: |
      Read MEMORY.md for your notes from the previous sessions.

      Continue the code review. Read these 12 files IN ORDER. You MUST read all 12 files before finishing — do not stop early.

      **Batch 3 — torch/optim/ (remaining) + torch/autograd/ + torch/nn utilities:**
      26. torch/optim/lbfgs.py
      27. torch/optim/sparse_adam.py
      28. torch/optim/nadam.py
      29. torch/optim/radam.py
      30. torch/optim/_adafactor.py
      31. torch/optim/_muon.py
      32. torch/autograd/forward_ad.py
      33. torch/autograd/grad_mode.py
      34. torch/autograd/anomaly_mode.py
      35. torch/autograd/function.py
      36. torch/nn/parameter.py
      37. torch/nn/init.py

      For each file:
      - Read the entire file
      - Note constructor signatures, defaults, inheritance
      - Note numerical constants and implementation details
      - Add a brief entry to MEMORY.md

  - session_index: 4
    prompt: |
      Read MEMORY.md for your notes from the complete code review.

      Now the tech leads need a precise technical reference. Write TECHNICAL_REFERENCE.md with these sections:

      **1. Complete Optimizer Defaults**
      For every optimizer you reviewed, list the exact __init__ signature with every parameter and its default value. Format as code blocks.

      **2. Neural Network Module Signatures**
      For each nn.Module class you reviewed, list the __init__ signature with defaults and the forward() signature.

      **3. Numerical Constants Inventory**
      Every hardcoded number, magic constant, epsilon value, or default threshold you encountered. Include the file, the context, and the exact value.

      **4. Class Hierarchy**
      Which classes inherit from what? Show the inheritance relationships you found.

      **5. Cross-Module Patterns**
      Common design patterns, shared conventions, and recurring idioms across the three subsystems.

      **6. Deprecations and Warnings**
      Every deprecation notice, FutureWarning, or TODO you found. File and description.

      Be precise — exact values, exact parameter names, exact signatures. The tech leads will verify against source. Work from your notes and your understanding of the code.
